version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount code for live reloading during development
      - ./backend:/app
      # Persist ChromaDB data outside container
      - ./chromadb_data:/app/chromadb_data
      # Persist uploaded files outside container
      - ./uploads:/app/uploads
    environment:
      # IMPORTANT: Point to host machine's Ollama, not localhost inside Docker
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MODEL_NAME=gemma:2b
    extra_hosts:
      # Allows container to reach your host machine's services
      - "host.docker.internal:host-gateway"
    restart: unless-stopped